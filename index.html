<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schooler Pro - Meet Our Team</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="team-section">
        
        <div class="deco-diamond-left"></div>
        <div class="deco-diamond-right"></div>
        
        <svg class="deco-triangle" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="20,2 38,35 2,35" stroke="#93c5fd" stroke-width="2.5" fill="none"/>
        </svg>

        <div class="team-header">
            <span class="subtitle">— OUR TEAM</span>
            <h2 class="main-title">Meet our <span class="highlight">Team</span></h2>
        </div>

        <div class="team-grid">
            
            <div class="team-card">
                <div class="image-wrapper">
                    <img src="images/member1.png" alt="Sandeep Vinjamuri">
                </div>
                <div class="member-name">Sandeep Vinjamuri</div>
            </div>

            <div class="team-card">
                <div class="image-wrapper">
                    <img src="images/member2.png" alt="Pavan Kotha">
                </div>
                <div class="member-name">Pavan Kotha</div>
            </div>

            <div class="team-card">
                <div class="image-wrapper">
                    <img src="images/member3.png" alt="Subhojith">
                </div>
                <div class="member-name">Subhojith</div>
            </div>

            <div class="team-card">
                <div class="image-wrapper">
                    <img src="images/member4.png" alt="Soumya">
                </div>
                <div class="member-name">Soumya</div>
            </div>

            <div class="team-card">
                <div class="image-wrapper">
                    <img src="images/member5.png" alt="Devanjan">
                </div>
                <div class="member-name">Devanjan</div>
            </div>

        </div>
    </section>

</body>
</html>
